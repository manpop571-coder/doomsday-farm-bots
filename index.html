<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#112535">
  <title>Doomsday Farm Bots</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand-block">
        <div id="eyebrow" class="eyebrow">CONTROL PANEL</div>
        <h1 id="appTitle">Doomsday Farm Bots</h1>
      </div>
      <button id="languageBtn" class="icon-btn" type="button" aria-label="Change language" title="Change language">🌐</button>
    </header>

    <section id="languageScreen" class="panel language-panel" hidden></section>

    <section id="appScreen" hidden>
      <div id="userInfo" class="user-info"></div>
      <div id="farms" class="farm-list"></div>
      <div class="save-dock">
        <button id="saveBtn" class="save-btn" type="button"></button>
        <div id="message" role="status" aria-live="polite"></div>
      </div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
